name: ShipGhost CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality & Unit Tests (Python) ─────────
  backend-quality:
    name: "Stage 1 · Python Quality & Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "executas/shipghost/pyproject.toml"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pycryptodome flake8 black
          pip install -e executas/shipghost

      - name: Format check (Black)
        run: black --check executas/shipghost/plugin.py

      - name: Lint check (Flake8)
        run: flake8 executas/shipghost/plugin.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests with coverage
        run: pytest tests/ -v --cov=executas/shipghost --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7

  # ── STAGE 2: Security Gate ────────────────────────────────
  security-audit:
    name: "Stage 2 · Dependency & Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pip audit
        run: |
          pip install pip-audit
          pip-audit -r executas/shipghost/pyproject.toml || true

  # ── STAGE 3: Build Verification ───────────────────────────
  build-check:
    name: "Stage 3 · Package Build Check"
    needs: [backend-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build python source distribution & wheel
        run: |
          pip install build
          python -m build executas/shipghost/

  # ── STAGE 4: Offline & Verification Gate ──────────────────
  offline-verify:
    name: "Stage 4 · Offline & Air-gap Verification"
    needs: [build-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pycryptodome pytest
          pip install -e executas/shipghost

      - name: Verify offline execution script
        run: python scripts/verify_offline.py
