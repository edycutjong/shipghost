<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="ShipGhost — Git PR ghostwriter">
  <defs>
    <linearGradient id="gh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070e16"/>
      <stop offset="1" stop-color="#0c1330"/>
    </linearGradient>
    <linearGradient id="gh-title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ef2ff"/>
      <stop offset="1" stop-color="#8b8cf9"/>
    </linearGradient>
    <linearGradient id="gh-body" x1="0.3" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#eafdff"/>
      <stop offset="1" stop-color="#bfeefb"/>
    </linearGradient>
    <radialGradient id="gh-belly" cx="0.5" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gh-git" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gh-pen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7df0ff"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="gh-glow" cx="0.26" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#gh-bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#gh-glow)"/>

  <!-- floating twinkles -->
  <g fill="#00e5ff">
    <circle cx="560" cy="86" r="3" opacity="0.5"><animate attributeName="cy" values="86;64;86" dur="6.4s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="330" r="4" opacity="0.4"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1190" cy="120" r="3" opacity="0.5" fill="#8b8cf9"><animate attributeName="cy" values="120;96;120" dur="5.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- drifting mini ghost -->
  <g opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="700 70; 1120 70; 700 70" dur="14s" repeatCount="indefinite"/>
    <path d="M0 18 a18 18 0 0 1 36 0 v16 c0 4 -5 4 -7 1 -2 -3 -5 -3 -7 0 -2 3 -6 3 -8 0 -2 -3 -5 -3 -7 0 -2 3 -7 2 -7 -1 Z" fill="#00e5ff" opacity="0.6"/>
    <circle cx="12" cy="16" r="2.5" fill="#0c1330"/><circle cx="24" cy="16" r="2.5" fill="#0c1330"/>
  </g>

  <!-- mascot: improved ghost + git-merge badge -->
  <g transform="translate(150 40) scale(0.62)">
    <g>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 0 -14; 0 0" dur="4.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="-2 256 300; 2 256 300; -2 256 300" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>

      <ellipse cx="252" cy="430" rx="96" ry="15" fill="#000" opacity="0.3">
        <animate attributeName="rx" values="96;80;96" dur="4.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.16;0.3" dur="4.6s" repeatCount="indefinite"/>
      </ellipse>

      <path d="M130 268 C130 188 186 128 256 128 C326 128 382 188 382 268 V352 a31.5 25 0 0 1 -63 0 a31.5 25 0 0 1 -63 0 a31.5 25 0 0 1 -63 0 a31.5 25 0 0 1 -63 0 Z" fill="url(#gh-body)"/>
      <path d="M130 268 C130 188 186 128 256 128 C326 128 382 188 382 268 V352 a31.5 25 0 0 1 -63 0 a31.5 25 0 0 1 -63 0 a31.5 25 0 0 1 -63 0 a31.5 25 0 0 1 -63 0 Z" fill="url(#gh-belly)"/>
      <ellipse cx="206" cy="196" rx="46" ry="34" fill="#ffffff" opacity="0.55"/>

      <g>
        <path d="M168 322 q-18 6 -22 26" fill="none" stroke="#dff6fc" stroke-width="22" stroke-linecap="round"/>
        <g transform="rotate(34 196 300)">
          <rect x="150" y="292" width="150" height="17" rx="8.5" fill="url(#gh-pen)"/>
          <path d="M300 292 l30 8.5 -30 8.5 z" fill="#e9fbff"/>
          <path d="M330 297 l8 3.5 -8 3.5 z" fill="#101830"/>
          <rect x="150" y="292" width="34" height="17" rx="8.5" fill="#6366f1"/>
        </g>
        <path d="M362 318 l4 11 11 4 -11 4 -4 11 -4 -11 -11 -4 11 -4z" fill="#7df0ff">
          <animate attributeName="opacity" values="0;1;0" dur="1.6s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="scale" additive="sum" values="0.6;1.1;0.6" dur="1.6s" repeatCount="indefinite"/>
        </path>
      </g>

      <circle cx="196" cy="266" r="14" fill="#fb7185" opacity="0.42"/>
      <circle cx="316" cy="266" r="14" fill="#fb7185" opacity="0.42"/>

      <ellipse cx="214" cy="246" rx="15" ry="18.5" fill="#0e1730"><animate attributeName="ry" values="18.5;18.5;2;18.5;18.5" keyTimes="0;0.9;0.94;0.98;1" dur="5s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="298" cy="246" rx="15" ry="18.5" fill="#0e1730"><animate attributeName="ry" values="18.5;18.5;2;18.5;18.5" keyTimes="0;0.9;0.94;0.98;1" dur="5s" repeatCount="indefinite"/></ellipse>
      <circle cx="220" cy="239" r="5.5" fill="#fff"/>
      <circle cx="304" cy="239" r="5.5" fill="#fff"/>
      <circle cx="210" cy="252" r="2.6" fill="#7df0ff"/>
      <circle cx="294" cy="252" r="2.6" fill="#7df0ff"/>

      <path d="M236 270 q20 20 40 0" fill="#0e1730" stroke="#0e1730" stroke-width="6" stroke-linejoin="round"/>
      <path d="M249 279 q7 8 14 0 z" fill="#fb7185"/>
    </g>

    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="4.6s" begin="-0.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
      <path d="M392 120 v36 q0 26 26 26 q26 0 26 26 v36" fill="none" stroke="url(#gh-git)" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
      <circle cx="392" cy="112" r="14" fill="#0c1330" stroke="url(#gh-git)" stroke-width="9"/>
      <circle cx="444" cy="288" r="14" fill="#0c1330" stroke="url(#gh-git)" stroke-width="9"><animate attributeName="r" values="14;17;14" dur="2s" repeatCount="indefinite"/></circle>
      <circle r="7" fill="#7df0ff">
        <animateMotion dur="2.6s" repeatCount="indefinite" path="M392 120 v36 q0 26 26 26 q26 0 26 26 v36"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- wordmark -->
  <text x="500" y="180" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="90" font-weight="800" fill="url(#gh-title)" letter-spacing="-2">ShipGhost</text>
  <text x="504" y="232" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="27" font-weight="500" fill="#a9b8d8">Git PR ghostwriter — built on Anna</text>

  <!-- feature pills -->
  <g font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="20" font-weight="600">
    <g><rect x="504" y="270" width="150" height="44" rx="22" fill="#0a2630" stroke="#00e5ff" stroke-opacity="0.4"/><text x="579" y="298" fill="#7fe9f5" text-anchor="middle">Anna App</text></g>
    <g><rect x="666" y="270" width="186" height="44" rx="22" fill="#15173a" stroke="#8b8cf9" stroke-opacity="0.4"/><text x="759" y="298" fill="#c0c2fb" text-anchor="middle">AES-GCM-256</text></g>
    <g><rect x="864" y="270" width="186" height="44" rx="22" fill="#0a2630" stroke="#00e5ff" stroke-opacity="0.4"/><text x="957" y="298" fill="#7fe9f5" text-anchor="middle">GPG Clearsign</text></g>
    <g><rect x="1062" y="270" width="120" height="44" rx="22" fill="#15173a" stroke="#8b8cf9" stroke-opacity="0.4"/><text x="1122" y="298" fill="#c0c2fb" text-anchor="middle">APS KV</text></g>
  </g>

  <!-- sparkles -->
  <path d="M472 92 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5z" fill="#8b8cf9"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/></path>
  <path d="M1212 300 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4z" fill="#00e5ff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="1.2s" repeatCount="indefinite"/></path>
</svg>
